name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          gcc-arm-none-eabi \
          libnewlib-arm-none-eabi \
          libstdc++-arm-none-eabi-newlib \
          build-essential \
          python3

    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git --depth=1 --branch 2.1.0
        cd pico-sdk
        git submodule update --init --depth=1

    - name: Clone PIO USB library
      run: |
        git clone https://github.com/sekigon-gonnoc/Pico-PIO-USB.git --depth=1
        PIO_SRC=Pico-PIO-USB/src
        BSP_DIR=pico-sdk/lib/tinyusb/hw/bsp/rp2040
        PIO_USB_DIR=pico-sdk/lib/tinyusb/src/portable/raspberrypi/pio_usb
        cp $PIO_SRC/*.h $BSP_DIR/
        cp $PIO_SRC/*.h $PIO_USB_DIR/
        cp $PIO_SRC/*.pio $BSP_DIR/ 2>/dev/null || true
        cp $PIO_SRC/*.pio $PIO_USB_DIR/ 2>/dev/null || true

    - name: Clone tusb_xinput library
      run: |
        git clone https://github.com/Ryzee119/tusb_xinput.git --depth=1
        # Copy xinput host driver into TinyUSB class directory
        cp tusb_xinput/xinput_host.c pico-sdk/lib/tinyusb/src/class/xinput/
        cp tusb_xinput/xinput_host.h pico-sdk/lib/tinyusb/src/class/xinput/ 2>/dev/null || true
        mkdir -p pico-sdk/lib/tinyusb/src/class/xinput
        cp tusb_xinput/*.c pico-sdk/lib/tinyusb/src/class/xinput/
        cp tusb_xinput/*.h pico-sdk/lib/tinyusb/src/class/xinput/

    - name: Patch TinyUSB BSP
      run: |
        sed -i '1s/^/#define BOARD_TUH_RHPORT 1\n/' \
          pico-sdk/lib/tinyusb/hw/bsp/rp2040/family.c
        sed -i 's/^\( *\)return pio_usb_host_endpoint_abort_transfer/\1\/\/ return pio_usb_host_endpoint_abort_transfer/' \
          pico-sdk/lib/tinyusb/src/portable/raspberrypi/pio_usb/hcd_pio_usb.c 2>/dev/null || true
        sed -i 's/^\( *\)return pio_usb_host_get_frame_number/\1\/\/ return pio_usb_host_get_frame_number/' \
          pico-sdk/lib/tinyusb/src/portable/raspberrypi/pio_usb/hcd_pio_usb.c 2>/dev/null || true

    - name: Configure build
      run: |
        mkdir build
        cd build
        cmake .. \
          -DPICO_SDK_PATH=../pico-sdk \
          -DPICO_BOARD=adafruit_feather_rp2040_usb_host \
          -DPICO_PIO_USB_PATH=../Pico-PIO-USB \
          -DTUSB_XINPUT_PATH=../tusb_xinput \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build firmware
      run: |
        cd build
        make -j$(nproc)

    - name: Upload .uf2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: analog-keyboard-humanizer
        path: build/*.uf2
        retention-days: 90
