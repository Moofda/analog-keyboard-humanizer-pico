name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          gcc-arm-none-eabi \
          libnewlib-arm-none-eabi \
          libstdc++-arm-none-eabi-newlib \
          build-essential \
          python3

    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git --depth=1 --branch 2.1.0
        cd pico-sdk
        git submodule update --init --depth=1

    - name: Patch TinyUSB for RP2350-USB-A
      run: |
        # Waveshare RP2350-USB-A requires commenting out return statements
        # in the PIO USB host driver for proper operation
        sed -i 's/return pio_usb_host_endpoint_abort_transfer/\/\/ return pio_usb_host_endpoint_abort_transfer/' \
          pico-sdk/lib/tinyusb/src/portable/raspberrypi/pio_usb/hcd_pio_usb.c || true
        sed -i 's/return pio_usb_host_get_frame_number/\/\/ return pio_usb_host_get_frame_number/' \
          pico-sdk/lib/tinyusb/src/portable/raspberrypi/pio_usb/hcd_pio_usb.c || true

    - name: Configure build
      run: |
        mkdir build
        cd build
        cmake .. \
          -DPICO_SDK_PATH=../pico-sdk \
          -DPICO_BOARD=pico2 \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build firmware
      run: |
        cd build
        make -j$(nproc)

    - name: Upload .uf2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: analog-keyboard-humanizer
        path: build/*.uf2
        retention-days: 90
